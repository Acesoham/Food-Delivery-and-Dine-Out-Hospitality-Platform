events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream api {
        server api:5000;
    }

    #
    # FoodHub HTTP -> HTTPS
    #
    server {
        listen 80;
        server_name foodhub.dedyn.io;

        return 301 https://$host$request_uri;
    }

    #
    # Jenkins HTTP -> HTTPS
    #
    server {
        listen 80;
        server_name jenkins.foodhub.dedyn.io;

        return 301 https://$host$request_uri;
    }

    #
    # Jenkins HTTPS
    #
    server {
        listen 443 ssl;
        server_name jenkins.foodhub.dedyn.io;

        ssl_certificate /etc/letsencrypt/live/foodhub.dedyn.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/foodhub.dedyn.io/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        location / {

            proxy_pass http://host.docker.internal:8080;

            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Server $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    #
    # FoodHub HTTPS
    #
    server {
        listen 443 ssl;
        server_name foodhub.dedyn.io;

        ssl_certificate /etc/letsencrypt/live/foodhub.dedyn.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/foodhub.dedyn.io/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            proxy_pass http://api;
        }

        location /socket.io/ {
            proxy_pass http://api;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
        }
    }
}
